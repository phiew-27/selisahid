<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;overflow:hidden;background:#f7f5f2}

/* SLIDE */
.slide{
position:absolute;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
flex-direction:column;text-align:center;
opacity:0;transform:translateY(100%);
transition:.6s;
}
.slide.active{opacity:1;transform:translateY(0)}

/* BUNGA */
.floral{
position:absolute;width:100%;height:100%;
background:url('/floral.png') center/cover no-repeat;
opacity:0;transform:translateX(-100px);filter:blur(10px);
}
.slide.active .floral{
opacity:1;transform:translateX(0);filter:blur(0);transition:1s;
}

/* ANIMASI */
.fade-up{opacity:0;transform:translateY(30px)}
.slide.active .fade-up{opacity:1;transform:translateY(0);transition:0.8s}
.delay1{transition-delay:0.2s}
.delay2{transition-delay:0.4s}
.delay3{transition-delay:0.6s}

/* FONT */
h1{font-family:'Great Vibes';color:#7a6f4b}
.title{font-family:'Great Vibes';font-size:28px;color:#7a6f4b}
.desc{font-size:14px}

/* MENU */
.menu{
position:fixed;bottom:0;width:100%;
display:flex;background:#fff;
}
.nav-item{
flex:1;text-align:center;padding:5px;
opacity:0.5;cursor:pointer;
}
.nav-item.active{opacity:1;color:#7a6f4b}

/* VIP BOX */
#vipMenu{
display:none;
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:15px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="/music.mp3">
</audio>

<!-- OPENING -->
<div class="slide active">
<div class="floral"></div>
<h1 class="fade-up">Sahid & Haeriyah</h1>
<p class="fade-up delay1">Kepada Yth</p>
<h3 id="guest" class="fade-up delay2">Nama Tamu</h3>
<button onclick="go(1)">Buka</button>
</div>

<!-- QUOTES -->
<div class="slide">
<div class="floral"></div>
<h2 class="title fade-up">Assalamualaikum</h2>
<p class="fade-up delay1">Dengan memohon rahmat Allah SWT</p>
</div>

<!-- COUPLE -->
<div class="slide">
<div class="floral"></div>
<h1 class="fade-up">Sahid</h1>
<p class="desc fade-up delay1">Putra Bpk Saepudin</p>
<h1 class="fade-up delay2">Haeriyah</h1>
</div>

<!-- ACARA -->
<div class="slide">
<div class="floral"></div>
<h2 class="title fade-up">Akad</h2>
<p class="fade-up delay1">3 April 2026</p>
</div>

<!-- MAP -->
<div class="slide">
<div class="floral"></div>
<h2 class="title fade-up">Lokasi</h2>
<a href="https://maps.app.goo.gl/Yzfy7y3YXkCc1UiH7">Buka Maps</a>
</div>

<!-- RSVP -->
<div class="slide">
<div class="floral"></div>
<h2 class="title fade-up">Ucapan</h2>
<input id="namaTamu">
<button onclick="shareWA()">Kirim WA</button>
</div>

<!-- MENU -->
<div class="menu">
<div class="nav-item active" onclick="go(0)">🏠</div>
<div class="nav-item" onclick="go(1)">✨</div>
<div class="nav-item" onclick="go(2)">❤️</div>
<div class="nav-item" onclick="go(3)">📅</div>
<div class="nav-item" onclick="go(4)">📍</div>
<div class="nav-item" onclick="go(5)">💬</div>
</div>

<!-- VIP MENU -->
<div id="vipMenu">
<input id="namaVIP" placeholder="Nama">
<button onclick="shareWA()">Kirim</button>
</div>

<script>
const slides=document.querySelectorAll('.slide');
const nav=document.querySelectorAll('.nav-item');

function go(i){
slides.forEach(s=>s.classList.remove('active'));
nav.forEach(n=>n.classList.remove('active'));
slides[i].classList.add('active');
nav[i].classList.add('active');
}

/* VIP */
const p=new URLSearchParams(window.location.search);
if(p.get("vip")==="1"){
document.getElementById("vipMenu").style.display="block";
}

/* NAMA TAMU */
if(p.get("to")){
document.getElementById("guest").innerHTML=p.get("to");
}

/* WA AUTO */
function shareWA(){
let nama=document.getElementById("namaVIP").value;

let link=window.location.origin+"?to="+encodeURIComponent(nama);

let text=
"Kepada Yth\n"+nama+"\n\n"+
"Link Undangan:\n"+link;

window.open("https://wa.me/?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
